<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 10px;
            width: 350px;
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: white;
            color: #2575fc;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        a:hover {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome</h1>
        <p>Login or Register to continue</p>

        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>

</body>
</html>
